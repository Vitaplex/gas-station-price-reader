<input id="imageElement" type="file" placeholder="Upload image file..." accept=".jpg, .jpeg, .png"></input>
<button onclick="readFile()">Upload</button>
<script>
    imageElement.addEventListener("change", async () => { await readFile() });

    async function readFile() {
        let curFile = imageElement.files[0];

        if (!curFile) { alert("No file selected!"); return; }

        const reader = new FileReader();

        let fileContent;

        reader.onload = async function (e) {
            await sendFile(e.target.result);
        };

        reader.readAsDataURL(curFile);
    }

    async function sendFile(content) {
        console.log("Sending");
        
        const response = await fetch("/predict", {
            method: "POST",
            body: content
        })

        const responseBox = document.createElement("p");
        let responseContent = await response.json();
        responseBox.innerText = JSON.stringify(responseContent);
        document.body.appendChild(responseBox);
    }
</script>
